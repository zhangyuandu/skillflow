name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate SKILL.md
        run: |
          if [ ! -f "SKILL.md" ]; then
            echo "❌ SKILL.md not found"
            exit 1
          fi
          echo "✅ SKILL.md exists"
          
      - name: Validate frontmatter
        run: |
          python3 << 'EOF'
          import yaml
          import re
          
          with open('SKILL.md', 'r') as f:
              content = f.read()
          
          # Extract frontmatter
          match = re.search(r'^---\n(.*?)\n---', content, re.DOTALL)
          if not match:
              print("❌ No frontmatter found")
              exit(1)
          
          frontmatter = yaml.safe_load(match.group(1))
          
          if 'name' not in frontmatter:
              print("❌ Missing 'name' in frontmatter")
              exit(1)
          
          if 'description' not in frontmatter:
              print("❌ Missing 'description' in frontmatter")
              exit(1)
          
          print(f"✅ Valid frontmatter: name={frontmatter['name']}")
          EOF

  package:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Package skill
        run: |
          python3 << 'EOF'
          import zipfile
          import os
          from datetime import datetime
          
          skill_name = "skillflow"
          output_file = f"{skill_name}.skill"
          
          with zipfile.ZipFile(output_file, 'w', zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk('.'):
                  # Skip hidden and build directories
                  dirs[:] = [d for d in dirs if not d.startswith('.')]
                  
                  for file in files:
                      if file.startswith('.'):
                          continue
                      
                      file_path = os.path.join(root, file)
                      arc_name = os.path.join(skill_name, os.path.relpath(file_path, '.'))
                      zf.write(file_path, arc_name)
          
          print(f"✅ Packaged: {output_file} ({os.path.getsize(output_file)} bytes)")
          EOF
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillflow-skill
          path: skillflow.skill
      
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: skillflow.skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-install:
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: skillflow-skill
      
      - name: Test skill structure
        run: |
          unzip -l skillflow.skill
          
          # Verify required files
          unzip skillflow.skill -d /tmp/test
          
          if [ ! -f "/tmp/test/skillflow/SKILL.md" ]; then
            echo "❌ SKILL.md missing in package"
            exit 1
          fi
          
          echo "✅ Package structure valid"
